sonar.projectKey=Rookie-Adventures_jinsansan
sonar.organization=rookie-adventures

# 项目信息
sonar.projectName=jinsansan
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# 源代码路径
sonar.sources=frontend/src

# 覆盖率排除
sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/__tests__/**,\
  **/*.test.{ts,tsx},\
  **/*.spec.{ts,tsx},\
  **/mocks/**,\
  **/public/**,\
  src/main.tsx,\
  src/vite-env.d.ts,\
  **/types/**,\
  **/*.d.ts,\
  .eslintrc.cjs,\
  vite.config.ts,\
  vitest.config.ts

# 重复代码检测排除
sonar.cpd.exclusions=\
  **/node_modules/**,\
  **/__tests__/**,\
  **/*.test.{ts,tsx},\
  **/*.spec.{ts,tsx},\
  **/mocks/**,\
  **/types/**

# 源文件包含和排除
sonar.inclusions=src/**/*.{ts,tsx}
sonar.exclusions=\
  **/node_modules/**,\
  **/__tests__/**,\
  **/*.test.{ts,tsx},\
  **/*.spec.{ts,tsx},\
  **/mocks/**,\
  **/types/**

# 测试文件配置
sonar.test.inclusions=\
  **/__tests__/**/*.{ts,tsx},\
  **/*.test.{ts,tsx},\
  **/*.spec.{ts,tsx}
sonar.test.exclusions=**/node_modules/**

# JavaScript/TypeScript 特定配置
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPaths=frontend/tsconfig.json

# 其他设置
sonar.verbose=true
sonar.scm.provider=git 