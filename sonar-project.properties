sonar.projectKey=Rookie-Adventures_jinsansan
sonar.organization=rookie-adventures

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=jinsansan
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# 源代码路径配置
sonar.sources=frontend/src
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# 测试文件配置
sonar.tests=frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# JavaScript/TypeScript 特定配置
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.tsconfigPaths=frontend/tsconfig.json 