# 项目配置
sonar.projectKey=frontend
sonar.projectName=Frontend Project
sonar.sourceEncoding=UTF-8

# 源代码目录
sonar.sources=src
sonar.tests=src

# 测试文件模式
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

# 覆盖率排除
sonar.coverage.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.test.{ts,tsx},\
  **/*.spec.{ts,tsx},\
  **/tests/**,\
  **/mocks/**,\
  src/main.tsx,\
  src/vite-env.d.ts,\
  **/types/**,\
  **/*.d.ts

# 重复代码检测排除
sonar.cpd.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.{ts,tsx},\
  **/*.spec.{ts,tsx},\
  **/tests/**,\
  **/mocks/**

# 完全排除的文件
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/.git/**,\
  **/.vscode/**,\
  **/*.md,\
  **/*.json,\
  **/*.config.js,\
  **/*.config.ts

# 问题忽略规则
# 忽略测试文件中的特定问题
sonar.issue.ignore.multicriteria=1
sonar.issue.ignore.multicriteria.1.ruleKey=typescript:S1192
sonar.issue.ignore.multicriteria.1.resourceKey=src/**/*.test.ts,src/**/*.test.tsx

# 代码块忽略规则
sonar.issue.ignore.block=1
sonar.issue.ignore.block.1.beginBlockRegexp=// sonar-disable
sonar.issue.ignore.block.1.endBlockRegexp=// sonar-enable

# 质量配置
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json 