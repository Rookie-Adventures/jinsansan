# 项目配置
sonar.projectKey=Rookie-Adventures_jinsansan
sonar.projectName=Rookie-Adventures_jinsansan
sonar.organization=rookie-adventures
sonar.sourceEncoding=UTF-8

# 源代码目录
sonar.sources=src
sonar.tests=src/**/__tests__

# 测试文件模式（更精确的匹配）
sonar.test.inclusions=**/__tests__/**/*.test.{ts,tsx},**/__tests__/**/*.spec.{ts,tsx}

# 覆盖率配置
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# 全局变量配置
sonar.javascript.globals=React,ReactDOM,JSX,angular,goog,google,OpenLayers,d3,dojo,dojox,dijit,Backbone,moment,casper,_,sap

# 覆盖率排除（优化排除规则）
sonar.coverage.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  **/__tests__/**,\
  **/mocks/**,\
  src/main.tsx,\
  src/vite-env.d.ts,\
  **/*.d.ts

# 重复代码检测（更严格的设置）
sonar.cpd.minimumLines=5
sonar.cpd.minimumTokens=50
sonar.cpd.exclusions=\
  **/__tests__/**,\
  **/mocks/**

# 完全排除的文件（简化并明确）
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  .git/**,\
  .vscode/**,\
  **/*.md,\
  **/*.json,\
  **/*.config.{js,ts},\
  .cursorrules,\
  cursor.config,\
  .gitignore,\
  .prettierrc,\
  .eslintrc.*,\
  .env*

# 问题检测规则
sonar.issue.ignore.multicriteria=1,2,3,4
# 忽略测试文件中的字符串重复
sonar.issue.ignore.multicriteria.1.ruleKey=typescript:S1192
sonar.issue.ignore.multicriteria.1.resourceKey=src/**/__tests__/**
# 忽略测试文件中的魔术数字
sonar.issue.ignore.multicriteria.2.ruleKey=typescript:S109
sonar.issue.ignore.multicriteria.2.resourceKey=src/**/__tests__/**
# 允许在测试文件中使用 console
sonar.issue.ignore.multicriteria.3.ruleKey=typescript:S2228
sonar.issue.ignore.multicriteria.3.resourceKey=src/**/__tests__/**
# 允许在测试文件中使用 debugger
sonar.issue.ignore.multicriteria.4.ruleKey=typescript:S1525
sonar.issue.ignore.multicriteria.4.resourceKey=src/**/__tests__/**

# 代码块忽略规则
sonar.issue.ignore.block=1
sonar.issue.ignore.block.1.beginBlockRegexp=// sonar-disable
sonar.issue.ignore.block.1.endBlockRegexp=// sonar-enable

# 死代码检测增强
sonar.javascript.checkJS=true
sonar.typescript.checkTS=true
sonar.typescript.ignoreNotFoundExports=true

# 代码复杂度阈值
sonar.javascript.maxFileComplexity=15
sonar.typescript.maxFileComplexity=15
sonar.javascript.maxFunctionComplexity=10
sonar.typescript.maxFunctionComplexity=10

# 代码重复检测
sonar.cpd.typescript.minimumLines=5
sonar.cpd.typescript.minimumTokens=50

# 未使用代码检测
sonar.typescript.tslint.reportPaths=tslint-report.json
sonar.typescript.tslint.configPath=tslint.json
sonar.typescript.tslint.timeout=60

# 质量门限配置
sonar.qualitygate.wait=true

# JavaScript/TypeScript 规则配置
sonar.javascript.rules.config=\
  javascript:S2990=on,\  # __proto__ property should not be used
  javascript:S5254=on,\  # <object> tags should provide alternative content
  javascript:S1440=off,\ # === and !== should be used instead of == and !=
  javascript:S1442=off,\ # alert(..) should not be used
  javascript:S2685=on,\  # arguments.caller and arguments.callee should not be used
  javascript:S2137=off,\ # arguments should not be accessed directly
  javascript:S3271=on,\  # Array sort methods should use compare function
  javascript:S3958=on,\  # Array.reduce() calls should include initial value
  javascript:S4326=off,\ # await should not be used redundantly
  javascript:S4123=on,\  # await should only be used with promises
  javascript:S2392=on,\  # case/default clauses should not contain lexical declarations
  javascript:S2737=on,\  # catch clauses should do more than rethrow
  javascript:S6789=on,\  # children and dangerouslySetInnerHTML should not be used together
  javascript:S3500=on,\  # const variables should not be reassigned
  javascript:S128=off,\  # continue should not be used
  javascript:S131=on,\   # default clauses should be last
  javascript:S2990=on,\  # delete should be used only with object properties
  javascript:S2870=on,\  # delete should not be used on arrays
  javascript:S4139=off,\ # for-in should not be used with iterables
  javascript:S4138=on,\  # for-of should be used with iterables
  javascript:S3579=off,\ # for..in loops should filter properties
  javascript:S2251=on,\  # for loop increment should modify counter
  javascript:S126=off,\  # if-else if should end with else
  javascript:S1301=on,\  # if should be preferred over switch when simpler
  javascript:S1862=on   # if/else if chains should not have same condition

# 代码复杂度规则
sonar.javascript.complexityRules=\
  javascript:S3776=10,\ # Cognitive Complexity threshold
  javascript:S1541=10   # Cyclomatic Complexity threshold

# React 特定规则
sonar.javascript.reactRules=\
  javascript:S6478=on,\ # React components should have displayName
  javascript:S6477=on,\ # React components should not have too many props
  javascript:S6479=on   # React components should not have too many state variables 