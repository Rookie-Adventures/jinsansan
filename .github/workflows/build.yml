name: 代码质量分析

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud 分析
    runs-on: windows-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 配置 Node.js 环境
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: 安装项目依赖
        working-directory: ./frontend
        run: npm ci
          
      - name: 执行测试和覆盖率分析
        working-directory: ./frontend
        run: npm run test:coverage
        
      - name: 检查覆盖率报告
        working-directory: ./frontend
        run: |
          if not exist coverage\lcov.info (
            echo "错误：未找到覆盖率报告文件 coverage/lcov.info!"
            exit 1
          )
          
      - name: 执行 SonarCloud 分析
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.verbose=true
            -Dsonar.projectKey=Rookie-Adventures_jinsansan
            -Dsonar.organization=rookie-adventures
            -Dsonar.sources=frontend/src
            -Dsonar.tests=frontend/src/**/__tests__
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.typescript.tsconfigPath=frontend/tsconfig.json
            -Dsonar.projectBaseDir=.